<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hivu HR — Employee App</title>
<meta name="theme-color" content="#1A1F3B">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
:root {
  --navy: #1A1F3B;
  --blue: #0066FF;
  --teal: #00D4FF;
  --red: #FF4D6A;
  --muted: #8A9BB5;
  --bg: #1A1F3B;
  --surface: #2A3247;
  --radius: 12px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  color: #F5F7FA;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  background: var(--surface);
}

.screen {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.login-screen {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: linear-gradient(135deg, #1A1F3B 0%, #0A0F25 100%);
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-card {
  background: #2A3247;
  border: 1px solid rgba(0, 212, 255, 0.15);
  border-radius: 16px;
  padding: 24px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

.login-title {
  font-size: 18px;
  font-weight: 700;
  color: #F5F7FA;
  margin-bottom: 4px;
}

.login-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 20px;
}

.form-input {
  width: 100%;
  padding: 13px 14px;
  border: 1.5px solid #2A3247;
  border-radius: 8px;
  font-size: 14px;
  color: #F5F7FA;
  background: #1A1F3B;
  margin-bottom: 12px;
  font-family: 'Inter', sans-serif;
}

.form-input:focus {
  border-color: var(--teal);
  background: #2A3247;
  outline: none;
}

.btn-login {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  background: linear-gradient(135deg, #0066FF, #00D4FF);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-login:hover {
  background: linear-gradient(135deg, #0055DD, #00B8DD);
  transform: translateY(-1px);
}

.btn-login:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.otp-row {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 5px;
  margin-bottom: 16px;
}

.otp-box {
  padding: 10px 2px;
  border: 1.5px solid #2A3247;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 700;
  text-align: center;
  color: #F5F7FA;
  background: #1A1F3B;
  font-family: 'Inter', sans-serif;
}

.otp-box:focus {
  border-color: var(--teal);
  background: #2A3247;
  outline: none;
}

.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #2A3247;
  color: #F5F7FA;
  padding: 11px 20px;
  border-radius: 24px;
  font-size: 13px;
  z-index: 999;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.loader {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.hero {
  background: linear-gradient(135deg, #1A1F3B 0%, #0A0F25 100%);
  padding: 20px;
  border-bottom: 1px solid rgba(0, 212, 255, 0.1);
}

.hero-name {
  font-size: 19px;
  font-weight: 700;
  color: #F5F7FA;
}

.hero-role {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

.topbar {
  background: var(--navy);
  border-bottom: 1px solid rgba(0, 212, 255, 0.1);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.topbar-title {
  font-weight: 700;
  font-size: 15px;
}

.btn-signout {
  margin-top: 20px;
  width: 100%;
  padding: 13px;
  border-radius: 8px;
  background: rgba(255, 77, 106, 0.1);
  color: var(--red);
  font-weight: 700;
  border: 1px solid rgba(255, 77, 106, 0.2);
  cursor: pointer;
  transition: all 0.2s;
}

.btn-signout:hover {
  background: var(--red);
  color: #fff;
}

.clock-btn {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  background: linear-gradient(135deg, #0066FF, #00D4FF);
  color: #fff;
  font-weight: 700;
  border: none;
  cursor: pointer;
  margin: 20px 0;
}

.section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  margin: 20px 0 10px;
}

.form-card {
  background: var(--surface);
  border: 1px solid rgba(0, 212, 255, 0.1);
  border-radius: var(--radius);
  padding: 16px;
  margin: 16px 0;
}

.form-group {
  margin-bottom: 14px;
}

.form-label {
  font-size: 12px;
  font-weight: 600;
  color: #F5F7FA;
  margin-bottom: 6px;
  display: block;
}

.btn-submit {
  width: 100%;
  padding: 13px;
  border-radius: 8px;
  background: linear-gradient(135deg, #0066FF, #00D4FF);
  color: #fff;
  font-weight: 700;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

.hidden {
  display: none;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
  <div style="text-align: center; margin-bottom: 30px;">
    <img src="data:image/svg+xml,%3Csvg viewBox='0 0 1200 520' style='height:100px' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g1' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2366e5ff'/%3E%3Cstop offset='100%25' stop-color='%230066ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='230' y='180' width='80' height='280' rx='20' fill='url(%23g1)'/%3E%3Crect x='280' y='280' width='280' height='60' rx='20' fill='url(%23g1)'/%3E%3Crect x='480' y='180' width='80' height='280' rx='20' fill='url(%23g1)'/%3E%3Crect x='620' y='180' width='60' height='120' rx='20' fill='url(%23g1)'/%3E%3Crect x='630' y='340' width='40' height='120' rx='20' fill='url(%23g1)'/%3E%3Cpath d='M 760 180 L 840 380 L 900 180 L 980 180 L 860 420 Q 850 450 840 460 L 800 460 Q 790 450 780 420 L 680 180 Z' fill='url(%23g1)'/%3E%3Cpath d='M 1020 180 L 1020 360 Q 1020 440 1080 460 Q 1140 460 1140 360 L 1140 180 L 1200 180 L 1200 360 Q 1200 480 1080 500 Q 950 500 950 360 L 950 180 L 1020 180 Z' fill='url(%23g1)'/%3E%3C/svg%3E" alt="Hivu" style="height: 100px; width: auto;">
  </div>

  <div class="login-card" id="login-step-phone">
    <div class="login-title">Sign in</div>
    <div class="login-sub">Enter your mobile number</div>
    <input class="form-input" type="tel" id="phone-input" placeholder="9876543210" maxlength="10" inputmode="tel">
    <button class="btn-login" onclick="sendOTP()">Send OTP</button>
  </div>

  <div class="login-card" id="login-step-otp" style="display:none">
    <div class="login-title">Enter OTP</div>
    <div class="login-sub" id="otp-sub">Code: 123456</div>
    <div class="otp-row">
      <input class="otp-box" maxlength="1" inputmode="numeric" oninput="otpInput(this, 0)">
      <input class="otp-box" maxlength="1" inputmode="numeric" oninput="otpInput(this, 1)">
      <input class="otp-box" maxlength="1" inputmode="numeric" oninput="otpInput(this, 2)">
      <input class="otp-box" maxlength="1" inputmode="numeric" oninput="otpInput(this, 3)">
      <input class="otp-box" maxlength="1" inputmode="numeric" oninput="otpInput(this, 4)">
      <input class="otp-box" maxlength="1" inputmode="numeric" oninput="otpInput(this, 5)">
    </div>
    <button class="btn-login" onclick="verifyOTP()">Verify & Sign In</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" class="app hidden">
  <div class="topbar">
    <div class="topbar-title">Hivu HR</div>
    <button onclick="signOut()" style="background: none; border: none; color: #F5F7FA; cursor: pointer; font-size: 18px;">
      <i class="ti ti-logout"></i>
    </button>
  </div>

  <div class="screen">
    <div class="hero">
      <div class="hero-name" id="hero-name">Ramesh Kumar</div>
      <div class="hero-role" id="hero-role">Manager · Operations</div>
    </div>

    <div id="pg-home">
      <div class="section-title">Today's Status</div>
      <button class="clock-btn" onclick="handleClock()" id="clock-btn">Clock In</button>

      <div class="section-title">Quick Actions</div>
      <button class="clock-btn" onclick="showLeave()" style="background: linear-gradient(135deg, #00D4FF, #0099FF);">Apply Leave</button>
    </div>

    <div id="pg-leave" class="hidden">
      <div class="form-card">
        <div class="section-title">Apply for Leave</div>
        <div class="form-group">
          <label class="form-label">Leave Type</label>
          <select class="form-input" id="leave-type">
            <option>Casual Leave</option>
            <option>Sick Leave</option>
            <option>Earned Leave</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">From Date</label>
          <input type="date" class="form-input" id="leave-from">
        </div>
        <div class="form-group">
          <label class="form-label">To Date</label>
          <input type="date" class="form-input" id="leave-to">
        </div>
        <button class="btn-submit" onclick="submitLeave()">Submit</button>
        <button class="btn-submit" style="background: #2A3247; color: #F5F7FA; margin-top: 10px;" onclick="showHome()">Back</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
const SUPABASE_URL = SUPABASE_CONFIG.supabaseUrl;
const SUPABASE_KEY = SUPABASE_CONFIG.supabaseAnonKey;

let currentUser = null;
let clockedIn = false;

async function sendOTP() {
  const phone = document.getElementById('phone-input').value.trim();
  if (!phone || phone.length < 10) {
    showToast('Enter valid phone number');
    return;
  }

  const btn = document.querySelector('#login-step-phone .btn-login');
  btn.disabled = true;
  btn.innerHTML = '<div class="loader"></div> Sending...';

  try {
    // Check if user exists
    const response = await fetch(
      `${SUPABASE_URL}/rest/v1/users?phone=eq.+91${phone.slice(-10)}&select=id`,
      {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json'
        }
      }
    );

    const data = await response.json();

    if (data && data.length > 0) {
      console.log('📧 Demo OTP: 123456');
      showToast('OTP sent! Demo: 123456');
      document.getElementById('login-step-phone').style.display = 'none';
      document.getElementById('login-step-otp').style.display = 'block';
      window.currentPhone = '+91' + phone.slice(-10);
    } else {
      showToast('Phone number not found');
    }
  } catch (err) {
    console.error('Error:', err);
    showToast('Error: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Send OTP';
  }
}

async function verifyOTP() {
  const otp = Array.from(document.querySelectorAll('.otp-box')).map(b => b.value).join('');

  if (otp !== '123456') {
    showToast('Invalid OTP');
    return;
  }

  try {
    // Get user and employee data
    const response = await fetch(
      `${SUPABASE_URL}/rest/v1/users?phone=eq.${window.currentPhone}&select=id,employee_id`,
      {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      }
    );

    const users = await response.json();
    if (users && users.length > 0) {
      const userId = users[0].id;
      const empId = users[0].employee_id;

      // Get employee details
      const empResponse = await fetch(
        `${SUPABASE_URL}/rest/v1/employees?id=eq.${empId}&select=*`,
        {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        }
      );

      const employees = await empResponse.json();
      if (employees && employees.length > 0) {
        currentUser = {
          id: userId,
          phone: window.currentPhone,
          ...employees[0]
        };

        localStorage.setItem('hivuhr_user', JSON.stringify(currentUser));

        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('hero-name').textContent = currentUser.name;
        document.getElementById('hero-role').textContent = `${currentUser.designation} · ${currentUser.department}`;

        showToast('✓ Login successful!');
      }
    }
  } catch (err) {
    showToast('Login error: ' + err.message);
  }
}

async function handleClock() {
  if (!currentUser) return;

  const btn = document.getElementById('clock-btn');
  btn.disabled = true;

  try {
    if (!clockedIn) {
      // Clock In
      const now = new Date();
      const response = await fetch(
        `${SUPABASE_URL}/rest/v1/attendance_logs`,
        {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            employee_id: currentUser.id,
            company_id: 1,
            date: now.toISOString().split('T')[0],
            day_name: now.toLocaleDateString('en-IN', { weekday: 'short' }),
            clock_in_time: now.toLocaleTimeString('en-IN', { hour12: false }).slice(0, 5),
            status: 'present'
          })
        }
      );

      if (response.ok) {
        clockedIn = true;
        btn.textContent = 'Clock Out';
        showToast('✓ Clocked in!');
      }
    } else {
      // Clock Out
      clockedIn = false;
      btn.textContent = 'Clock In';
      showToast('✓ Clocked out!');
    }
  } catch (err) {
    showToast('Error: ' + err.message);
  } finally {
    btn.disabled = false;
  }
}

async function submitLeave() {
  if (!currentUser) return;

  const leaveType = document.getElementById('leave-type').value;
  const fromDate = document.getElementById('leave-from').value;
  const toDate = document.getElementById('leave-to').value;

  if (!leaveType || !fromDate) {
    showToast('Fill all fields');
    return;
  }

  try {
    const response = await fetch(
      `${SUPABASE_URL}/rest/v1/leave_requests`,
      {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          employee_id: currentUser.id,
          company_id: 1,
          leave_type: leaveType,
          from_date: fromDate,
          to_date: toDate || fromDate,
          status: 'pending'
        })
      }
    );

    if (response.ok) {
      showToast('✓ Leave request submitted!');
      document.getElementById('leave-type').value = 'Casual Leave';
      document.getElementById('leave-from').value = '';
      document.getElementById('leave-to').value = '';
      setTimeout(showHome, 1000);
    }
  } catch (err) {
    showToast('Error: ' + err.message);
  }
}

function showLeave() {
  document.getElementById('pg-home').classList.add('hidden');
  document.getElementById('pg-leave').classList.remove('hidden');
}

function showHome() {
  document.getElementById('pg-home').classList.remove('hidden');
  document.getElementById('pg-leave').classList.add('hidden');
}

function signOut() {
  if (confirm('Sign out?')) {
    localStorage.removeItem('hivuhr_user');
    currentUser = null;
    clockedIn = false;
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('main-app').classList.add('hidden');
    document.getElementById('login-step-phone').style.display = 'block';
    document.getElementById('login-step-otp').style.display = 'none';
    document.getElementById('phone-input').value = '';
    showToast('✓ Signed out');
  }
}

function otpInput(el, idx) {
  el.value = el.value.replace(/\D/g, '');
  if (el.value && idx < 5) {
    document.querySelectorAll('.otp-box')[idx + 1].focus();
  }
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// Load user on startup
window.addEventListener('load', () => {
  const user = localStorage.getItem('hivuhr_user');
  if (user) {
    currentUser = JSON.parse(user);
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    document.getElementById('hero-name').textContent = currentUser.name;
    document.getElementById('hero-role').textContent = `${currentUser.designation} · ${currentUser.department}`;
  }
});
</script>

</body>
</html>
